services:
  api:
    build:
      context: .
      target: ${NODE_ENV:-development}
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env.${NODE_ENV:-development}
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dev_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    profiles: ["api"]
    restart: ${RESTART_POLICY:-no}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dev_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dev_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: ${RESTART_POLICY:-no}

volumes:
  pgdata: {}

networks:
  app-network:
    name: wager-zone-${NODE_ENV:-development}
